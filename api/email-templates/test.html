<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Email</title>
</head>
<body style="margin: 0; padding: 0; background-color: #0a0a0a;">
    <div style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; background-color: #0a0a0a;">
        
        <div style="text-align: center; padding: 20px 0; border-bottom: 1px solid #27272a;">
            <h1 style="color: #3b82f6; margin: 0; font-size: 24px;">SSH Manager</h1>
            <p style="color: #71717a; margin: 5px 0 0 0; font-size: 12px;">Crown Solutions</p>
        </div>
        
        <div style="padding: 30px 0;">
            <div style="text-align: center; margin-bottom: 20px;">
                <span style="display: inline-block; width: 60px; height: 60px; line-height: 60px; background-color: #3b82f6; border-radius: 50%; font-size: 30px;">📧</span>
            </div>
            
            <h2 style="color: #ffffff; text-align: center; margin: 0 0 20px 0; font-size: 20px;">Test Email Successful</h2>
            
            <div style="background-color: #18181b; border: 1px solid #27272a; border-radius: 8px; padding: 20px; margin-bottom: 20px;">
                <p style="color: #22c55e; margin: 0 0 15px 0; text-align: center;">
                    ✅ Your email configuration is working correctly!
                </p>
                <p style="color: #a1a1aa; margin: 0; text-align: center;">
                    This is a test email from SSH Manager. If you received this, your SMTP settings are properly configured.
                </p>
            </div>
            
            <div style="background-color: #27272a; border-radius: 6px; padding: 15px; text-align: center;">
                <p style="color: #71717a; margin: 0; font-size: 12px;">
                    Sent at: {{sentAt}}
                </p>
            </div>
        </div>
        
        <div style="text-align: center; padding: 20px 0; border-top: 1px solid #27272a; color: #52525b; font-size: 11px;">
            <p style="margin: 0;">This is a test email from SSH Manager.</p>
            <p style="margin: 5px 0 0 0;">Crown Solutions NOC System</p>
        </div>
        
    </div>
</body>
</html>
